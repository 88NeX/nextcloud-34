# Nginx для контейнера nc-web — обслуживает Nextcloud файлы,
# PHP отправляет в nc-app:9000 (PHP-FPM).

upstream php-handler {
    server nc-app:9000;
    keepalive 16;
}

server {
    listen 8080;
    server_name _;
    root  /var/www/html;
    index index.php index.html;

    client_max_body_size 16G;
    client_body_timeout 3600s;
    send_timeout        3600s;

    location = /robots.txt  { allow all; log_not_found off; access_log off; }
    location = /favicon.ico { log_not_found off; access_log off; }

    location ^~ /.well-known {
        # Абсолютный https:// — клиент получает корректный redirect независимо от схемы запроса
        location = /.well-known/carddav { return 301 https://$http_host/remote.php/dav; }
        location = /.well-known/caldav  { return 301 https://$http_host/remote.php/dav; }
        # rewrite (внутренний) вместо return 301 — не отправляет клиенту HTTP-редирект.
        # return 301 /index.php... строит абсолютный URL из текущей схемы/порта → http://...:8080/...
        rewrite ^ /index.php$request_uri last;
    }

    # Защита системных директорий
    location ~ ^/(?:build|tests|config|lib|3rdparty|templates|data)(?:$|/) { return 404; }
    location ~ ^/(?:\.|autotest|occ|issue|indie|db_|console)               { return 404; }

    # OCS provider — только базовый путь, не /ocs-provider/index.php
    # Иначе возникает цикл редиректов (location ^~ совпадает с /ocs-provider/index.php)
    location ~ ^/ocs-provider/?$ {
        rewrite ^ /ocs-provider/index.php last;
    }

    location / {
        rewrite ^ /index.php$request_uri;
    }

    location ~ \.php(?:$|/) {
        fastcgi_split_path_info ^(.+?\.php)(/.*)$;
        set $path_info $fastcgi_path_info;
        try_files $fastcgi_script_name =404;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME  $document_root$fastcgi_script_name;
        fastcgi_param PATH_INFO        $path_info;
        fastcgi_param front_controller_active true;
        fastcgi_pass php-handler;
        fastcgi_intercept_errors   on;
        fastcgi_request_buffering  off;
        fastcgi_max_temp_file_size 0;
        fastcgi_send_timeout    3600s;
        fastcgi_read_timeout    3600s;
        fastcgi_connect_timeout   60s;
    }

    # Статика — mjs обязательно, иначе Nextcloud Office не загружается
    location ~ \.(?:css|js|mjs|svg|gif|ico|jpg|jpeg|png|webp|wasm|tflite|map|ogg|flac)$ {
        try_files $uri /index.php$request_uri;
        expires 6M;
        access_log off;
    }
    location ~ \.(?:otf|woff2?)$ {
        try_files $uri /index.php$request_uri;
        expires 7d;
        access_log off;
    }

    location /remote { return 301 /remote.php$request_uri; }
}
