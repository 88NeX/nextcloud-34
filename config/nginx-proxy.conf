# Nginx reverse proxy — HTTP (LAN-развёртывание)
# Слушает порт 80, проксирует к nc-web:8080 (Nextcloud nginx).
#
# Для TLS: см. nginx-proxy-tls.conf

server {
    listen 80;
    server_name _;

    client_max_body_size 16G;
    client_body_timeout 3600s;
    send_timeout       3600s;

    add_header X-Content-Type-Options  nosniff    always;
    add_header X-Frame-Options         SAMEORIGIN always;
    add_header X-XSS-Protection        "1; mode=block" always;
    add_header Referrer-Policy         "no-referrer" always;

    location / {
        proxy_pass         http://nc-web:8080;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;
        proxy_set_header X-Forwarded-Port  $server_port;

        # WebSocket (Nextcloud Office collaborative editing)
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_connect_timeout      60s;
        proxy_send_timeout       3600s;
        proxy_read_timeout       3600s;
        proxy_request_buffering    off;
        proxy_buffering            off;
    }
}
