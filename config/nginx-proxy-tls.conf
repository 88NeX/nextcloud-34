# Nginx reverse proxy — HTTPS (TLS-терминация)
# Использовать вместо nginx-proxy.conf после получения сертификатов.
#
# Предварительные действия (в контейнере proxy или на хосте):
#   certbot certonly --standalone -d cloud.example.com
#   certbot certonly --standalone -d office.example.com
#
# После: поменять монтирование конфига в docker-compose.yml и
#         раскомментировать том с /etc/letsencrypt.

server {
    listen 80;
    server_name cloud.example.com office.example.com;
    return 301 https://$host$request_uri;
}

# ── Nextcloud ─────────────────────────────────────────────────────────────────
server {
    listen 443 ssl;
    http2  on;
    server_name cloud.example.com;

    ssl_certificate     /etc/letsencrypt/live/cloud.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/cloud.example.com/privkey.pem;

    ssl_protocols             TLSv1.2 TLSv1.3;
    ssl_ciphers               ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
    ssl_prefer_server_ciphers off;
    ssl_session_cache         shared:SSL:10m;
    ssl_session_timeout       1d;
    ssl_session_tickets       off;
    ssl_stapling              on;
    ssl_stapling_verify       on;
    resolver                  1.1.1.1 8.8.8.8 valid=300s;

    add_header Strict-Transport-Security "max-age=15552000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options    nosniff    always;
    add_header X-Frame-Options           SAMEORIGIN always;
    add_header Referrer-Policy           "no-referrer" always;

    client_max_body_size 16G;
    client_body_timeout 3600s;
    send_timeout        3600s;

    location / {
        proxy_pass         http://nc-web:8080;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host  $host;
        proxy_set_header X-Forwarded-Port  443;

        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_connect_timeout      60s;
        proxy_send_timeout       3600s;
        proxy_read_timeout       3600s;
        proxy_request_buffering    off;
        proxy_buffering            off;
    }
}

# ── Euro-Office DocumentServer ────────────────────────────────────────────────
server {
    listen 443 ssl;
    http2  on;
    server_name office.example.com;

    ssl_certificate     /etc/letsencrypt/live/office.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/office.example.com/privkey.pem;

    ssl_protocols             TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_session_cache         shared:SSL_EO:10m;

    add_header Strict-Transport-Security "max-age=15552000; includeSubDomains" always;
    add_header X-Content-Type-Options    nosniff always;

    client_max_body_size 100M;

    # WebSocket (совместное редактирование)
    location ~* ^/[\d]+\.[\d]+\.[\d]+\.[\d]+/(c2s|s2c) {
        proxy_pass         http://euro-office:80;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host       $host;
        proxy_set_header   X-Forwarded-Proto https;
        proxy_read_timeout 86400s;
    }

    location / {
        proxy_pass         http://euro-office:80;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host       $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto https;
        proxy_connect_timeout   60s;
        proxy_send_timeout     120s;
        proxy_read_timeout     120s;
        proxy_buffering         off;
    }
}
