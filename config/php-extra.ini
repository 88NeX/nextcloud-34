; Nextcloud-специфичные настройки PHP
; Монтируется в /usr/local/etc/php/conf.d/99-nextcloud.ini

memory_limit       = 512M
upload_max_filesize = 16G
post_max_size       = 16G
max_execution_time  = 3600
max_input_time      = 3600
output_buffering    = off

; Часовой пояс (при необходимости поменяйте)
date.timezone = Europe/Moscow

; OPcache — критично для производительности Nextcloud
opcache.enable                = 1
opcache.interned_strings_buffer = 32
opcache.max_accelerated_files = 10000
opcache.memory_consumption    = 256
opcache.revalidate_freq       = 60
opcache.save_comments         = 1
; JIT (PHP 8.1+, может давать +10-20% на высокой нагрузке)
opcache.jit                   = 1255
opcache.jit_buffer_size       = 64M
