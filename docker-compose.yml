version: '3.8'

# Nextcloud 34 + Euro-Office DocumentServer
# Все сервисы в одной сети nextcloud-net.
# Порты наружу: 80 (Nextcloud proxy), 8080 (Euro-Office).

services:

  # ── Reverse proxy (nginx) ────────────────────────────────────────────────
  proxy:
    image: nginx:1.26-alpine
    restart: unless-stopped
    ports:
      - "${PROXY_HTTP_PORT:-80}:80"
    volumes:
      - ./config/nginx-proxy.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - nc-web
    networks:
      - nextcloud-net

  # ── Nginx, обслуживает Nextcloud (статика + PHP-FPM gateway) ─────────────
  nc-web:
    image: nginx:1.26-alpine
    restart: unless-stopped
    volumes:
      - nextcloud-html:/var/www/html:ro
      - ./config/nginx-nextcloud.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - nc-app
    networks:
      - nextcloud-net

  # ── Nextcloud PHP-FPM ────────────────────────────────────────────────────
  nc-app:
    image: nextcloud:34-fpm-alpine
    restart: unless-stopped
    environment:
      POSTGRES_HOST: db
      POSTGRES_DB: ${POSTGRES_DB:-nextcloud}
      POSTGRES_USER: ${POSTGRES_USER:-nextcloud}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD required}
      NEXTCLOUD_ADMIN_USER: ${NEXTCLOUD_ADMIN_USER:-admin}
      NEXTCLOUD_ADMIN_PASSWORD: ${NEXTCLOUD_ADMIN_PASSWORD:?NEXTCLOUD_ADMIN_PASSWORD required}
      REDIS_HOST: redis
      REDIS_HOST_PASSWORD: ${REDIS_PASSWORD:?REDIS_PASSWORD required}
      # Все хосты через которые NC принимает запросы: публичный IP, proxy, nc-web
      NEXTCLOUD_TRUSTED_DOMAINS: >-
        localhost
        ${NEXTCLOUD_PUBLIC_HOST:-192.168.88.10}
        proxy
        nc-web
      NEXTCLOUD_DATA_DIR: /var/www/html/data
      PHP_MEMORY_LIMIT: 512M
      PHP_UPLOAD_LIMIT: 16G
    volumes:
      - nextcloud-html:/var/www/html
      - nextcloud-data:/var/www/html/data
      - ./config/php-extra.ini:/usr/local/etc/php/conf.d/99-nextcloud.ini:ro
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - nextcloud-net

  # ── PostgreSQL 16 ─────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-nextcloud}
      POSTGRES_USER: ${POSTGRES_USER:-nextcloud}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD required}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-nextcloud}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - nextcloud-net

  # ── Redis 7 ───────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD required}
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --save 60 100
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a $$REDIS_PASSWORD ping | grep PONG"]
      interval: 10s
      timeout: 5s
      retries: 5
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    networks:
      - nextcloud-net

  # ── Euro-Office DocumentServer (patched entrypoint) ───────────────────────
  euro-office:
    build:
      context: ./euro-office
    image: euro-office-patched:latest
    restart: unless-stopped
    environment:
      JWT_ENABLED: "true"
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET required}
      JWT_HEADER: AuthorizationJwt
      WOPI_ENABLED: "true"
    ports:
      - "${EURO_OFFICE_PORT:-8080}:80"
    # Резолвинг LAN-доменов внутри контейнера.
    # Euro-Office обращается к Nextcloud по WOPI — имя должно разрешаться.
    # В Proxmox LXC-сетапе эти IP задаются через Mikrotik DNS;
    # в docker-compose указываем явно через extra_hosts.
    extra_hosts:
      - "nextcloud.lan:${NEXTCLOUD_HOST_IP:-192.168.88.10}"
      - "eurooffice.lan:${EURO_OFFICE_HOST_IP:-192.168.88.10}"
    volumes:
      # Пути соответствуют фактическим путям внутри контейнера Euro-Office.
      # /var/log/euro-office — куда пишет supervisord (EO_LOG env).
      # /var/www/euro-office/Data — WOPI ключи, JWT secret, данные.
      - euro-office-logs:/var/log/euro-office
      - euro-office-data:/var/www/euro-office/Data
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost/healthcheck | grep -q 'true'"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s
    networks:
      - nextcloud-net

volumes:
  nextcloud-html:
  nextcloud-data:
  postgres-data:
  redis-data:
  euro-office-logs:
  euro-office-data:

networks:
  nextcloud-net:
    driver: bridge
